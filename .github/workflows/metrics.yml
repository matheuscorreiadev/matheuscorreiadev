name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Configurações básicas
          user: seu-usuario-do-github
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo

          # 📊 ABA DE LINGUAGENS MAIS USADAS
          plugin_languages: yes
          plugin_languages_ignored: html, css  # Esconde linguagens muito comuns (opcional)
          plugin_languages_details: percentage # Mostra a porcentagem exata ao lado
          plugin_languages_limit: 8            # Quantidade máxima de linguagens exibidas

          # 🏆 ABA DE CONQUISTAS (ACHIEVEMENTS)
          plugin_achievements: yes
          plugin_achievements_display: compact # Layout compacto (estilo medalhas)
          plugin_achievements_threshold: X     # Exibe medalhas de qualquer nível (B, A, X)
